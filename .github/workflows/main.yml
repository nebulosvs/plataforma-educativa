name: Build and Deploy Microservices

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      #################################################
      # CHECKOUT
      #################################################

      - name: Checkout repository
        uses: actions/checkout@v3

      #################################################
      # DOCKER HUB
      #################################################

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      #################################################
      # JAVA
      #################################################

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      #################################################
      # CURSOS SERVICE
      #################################################

      - name: Build cursos-service
        working-directory: ./cursos-service
        run: mvn clean package -DskipTests

      - name: Docker build cursos-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cursos-service:latest ./cursos-service

      - name: Push cursos-service
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cursos-service:latest

      #################################################
      # INSCRIPCIONES SERVICE
      #################################################

      - name: Build inscripciones-service
        working-directory: ./inscripciones-service
        run: mvn clean package -DskipTests

      - name: Docker build inscripciones-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/inscripciones-service:latest ./inscripciones-service

      - name: Push inscripciones-service
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/inscripciones-service:latest

      #################################################
      # AWS
      #################################################

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      #################################################
      # SSH KEY
      #################################################

      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 400 ~/.ssh/id_rsa

      #################################################
      # DEPLOY EC2
      #################################################

      - name: Deploy to EC2
        run: |
          ssh -T -i ~/.ssh/id_rsa \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'

            # Login DockerHub
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            # Crear carpeta proyecto
            mkdir -p ~/plataforma-educativa

            # Entrar carpeta
            cd ~/plataforma-educativa

            # Crear docker-compose.yml
            cat > docker-compose.yml << EOL
            version: '3'

            services:

              cursos-service:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/cursos-service:latest
                container_name: cursos-service
                ports:
                  - "8081:8081"

              inscripciones-service:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/inscripciones-service:latest
                container_name: inscripciones-service
                ports:
                  - "8082:8082"
                depends_on:
                  - cursos-service
            EOL

            # Descargar imágenes
            docker compose pull

            # Detener contenedores anteriores
            docker compose down || true

            # Levantar contenedores
            docker compose up -d

            # Verificar
            docker ps

          EOFname: SSH commands to deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # Autenticar en DockerHub desde EC2
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            # Descargar la última versión de la imagen
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
            # Parar y eliminar cualquier contenedor previo
            docker stop my-app || true && docker rm my-app || true
            # Iniciar el contenedor
            docker run -d --name my-app -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
          EOF
